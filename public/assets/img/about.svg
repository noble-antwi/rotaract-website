<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000" role="img" aria-label="About placeholder">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1F52"/><stop offset="1" stop-color="#17458F"/>
    </linearGradient>
    <pattern id="d" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ffffff" opacity=".07"/>
    </pattern>
  </defs>
  <rect width="800" height="1000" fill="url(#g)"/>
  <rect width="800" height="1000" fill="url(#d)"/>
  <g transform="translate(400 430)" fill="none" stroke="#fff" stroke-width="10" opacity=".5">
    <circle cx="0" cy="0" r="110"/>
    <circle cx="0" cy="0" r="48" fill="#D41367" stroke="none" opacity=".8"/>
  </g>
  <g transform="translate(400 720)" text-anchor="middle" font-family="system-ui,Segoe UI,Arial" fill="#fff">
    <text font-size="36" font-weight="800">about.jpg</text>
    <text y="44" font-size="22" opacity=".7">800 × 1000 — club / members portrait</text>
  </g>
</svg>
