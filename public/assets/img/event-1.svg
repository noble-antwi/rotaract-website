<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Event placeholder">
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#17458F"/><stop offset="1" stop-color="#0A2560"/></linearGradient></defs>
  <rect width="800" height="600" fill="url(#g)"/>
  <g transform="translate(400 240)" fill="none" stroke="#fff" stroke-width="9" opacity=".5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-90" y="-70" width="180" height="150" rx="14" transform="scale(1.2)"/>
    <line x1="-90" y1="-30" x2="90" y2="-30" transform="scale(1.2)"/>
    <line x1="-50" y1="-90" x2="-50" y2="-50" transform="scale(1.2)"/>
    <line x1="50" y1="-90" x2="50" y2="-50" transform="scale(1.2)"/>
  </g>
  <g transform="translate(400 470)" text-anchor="middle" font-family="system-ui,Segoe UI,Arial" fill="#fff">
