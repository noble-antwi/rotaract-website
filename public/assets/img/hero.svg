<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Hero placeholder">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1F52"/>
      <stop offset=".55" stop-color="#17458F"/>
      <stop offset="1" stop-color="#1B5DA8"/>
    </linearGradient>
    <pattern id="d" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ffffff" opacity=".08"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#d)"/>
  <g opacity=".10" fill="none" stroke="#fff" stroke-width="10">
    <circle cx="1280" cy="450" r="180"/>
    <circle cx="1280" cy="450" r="90"/>
  </g>
  <g transform="translate(800 400)" text-anchor="middle" fill="#9DBCE8" font-family="system-ui,Segoe UI,Arial" >
    <text y="0" font-size="44" font-weight="800" fill="#fff" opacity=".85">hero.jpg</text>
    <text y="48" font-size="26" opacity=".8">Replace with a real photo — 1600 × 900</text>
    <text y="86" font-size="20" opacity=".55">members at a social / service event</text>
  </g>
</svg>
